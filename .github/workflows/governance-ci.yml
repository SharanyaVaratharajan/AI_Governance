name: Governance CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  syntax-check:
    name: Python syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m compileall -q api.py db.py governance.py models.py tests
