{% extends "base.html" %}
{% block content %}
<h1 class="title">Incidents</h1>

<table class="table is-striped is-fullwidth">
<thead>
<tr>
<th>ID</th>
<th>System</th>
<th>Severity</th>
<th>Description</th>
<th>Created</th>
</tr>
</thead>
<tbody>
{% for i in incidents %}
<tr>
<td>{{ i.id }}</td>
<td>{{ i.system_name }}</td>
<td>{{ i.severity }}</td>
<td>{{ i.description }}</td>
<td>{{ i.created_at }}</td>
<td>
<a class="button is-small is-link" href="/incidents/{{ i.id }}">
View
</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
